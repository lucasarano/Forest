services:
  - type: web
    name: forest-backend
    env: docker
    repo: https://github.com/lucasarano/Forest
    branch: main
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: MVP_ADMIN_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
